<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الشكاوى - حدائق القبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'tajawal': ['Tajawal', 'sans-serif'] },
                    colors: {
                        'primary': '#0d9488', 'primary-dark': '#0f766e', 'secondary': '#1e293b',
                        'accent': '#f59e0b', 'muted': '#64748b', 'success': '#10b981',
                        'warning': '#f59e0b', 'danger': '#ef4444', 'info': '#3b82f6',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="font-tajawal">
    <div id="app">
        <!-- Navigation — تظهر فقط للصفحات العامة -->
        <nav id="public-nav" class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm border-b border-slate-200 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="navigateTo('home')">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        </div>
                        <span class="font-bold text-lg text-secondary">شكاوى حدائق القبة</span>
                    </div>
                    <div class="hidden md:flex items-center gap-6">
                        <button onclick="navigateTo('home')"   class="text-slate-600 hover:text-primary font-medium">الرئيسية</button>
                        <button onclick="navigateTo('submit')" class="text-slate-600 hover:text-primary font-medium">تقديم شكوى</button>
                        <button onclick="navigateTo('track')"  class="text-slate-600 hover:text-primary font-medium">تتبع شكوى</button>
                    </div>
                    <button onclick="toggleMobileMenu()" class="md:hidden p-2 rounded-lg hover:bg-slate-100" aria-label="القائمة">
                        <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-200">
                <div class="px-4 py-3 space-y-2">
                    <button onclick="navigateTo('home');  toggleMobileMenu();" class="block w-full text-right px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50">الرئيسية</button>
                    <button onclick="navigateTo('submit');toggleMobileMenu();" class="block w-full text-right px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50">تقديم شكوى</button>
                    <button onclick="navigateTo('track'); toggleMobileMenu();" class="block w-full text-right px-4 py-2 rounded-lg text-slate-600 hover:bg-slate-50">تتبع شكوى</button>
                </div>
            </div>
        </nav>

        <main id="main-content" class="pt-16"></main>
    </div>

    <div id="notifications" class="fixed top-20 left-4 right-4 sm:left-auto sm:right-4 sm:w-80 z-50 space-y-2"></div>

    <script src="assets/js/app.js"></script>
</body>
</html>
